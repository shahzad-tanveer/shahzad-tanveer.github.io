<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shahzad Tanveer — AI & ML Researcher</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#07101E;--bg2:#0C1628;--bg3:#111E35;
  --surface:#162240;--surf2:#1C2D52;
  --blue:#4A90E2;--blue-lt:#78B4F5;
  --text:#E4EDF8;--text2:#7A96B5;
  --border:rgba(74,144,226,.08);
  --borderg:rgba(74,144,226,.20);
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* HERO */
.hero{
  position:relative;
  min-height:100vh;
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  gap:4rem;
  padding:8rem 5rem;
}

/* IMAGE */
.hero-photo-wrap{
  position:relative;
  display:block; /* FIX: ensure visible on all devices */
}

.hero-photo{
  width:280px;
  height:390px;
  object-fit:cover;
  border-radius:14px;
  border:2px solid var(--surf2);
}

/* REMOVE OLD MOBILE HIDE RULE (IMPORTANT FIX)
@media(max-width:1024px){
  .hero-photo-wrap{display:none}
}
*/

/* RESPONSIVE FIX */
@media(max-width:1024px){
  .hero{
    grid-template-columns:1fr;
    text-align:center;
    gap:2rem;
    padding:6rem 1.5rem;
  }

  .hero-photo-wrap{
    display:flex;
    justify-content:center;
    margin-top:2rem;
  }

  .hero-photo{
    width:220px;
    height:300px;
  }
}

@media(max-width:600px){
  .hero-photo{
    width:180px;
    height:250px;
  }
}
</style>
</head>

<body>

<section class="hero">

  <div class="hero-left">
    <h1>Shahzad Tanveer</h1>
    <p>AI & ML Researcher</p>
  </div>

  <div class="hero-photo-wrap">
    <img src="shahzad.jpeg" class="hero-photo" alt="Shahzad Tanveer">
  </div>

</section>

</body>
</html>
